[agent]
  interval = "10s"
  round_interval = true
  metric_batch_size = 5000
  metric_buffer_limit = 50000
  flush_interval = "10s"
  skip_processors_after_aggregators = true

###########################################
# Prometheus Metrics Input
###########################################
[[inputs.file]]
  files = ["/logs/prometheus_metrics.csv"]
  data_format = "csv"
  csv_header_row_count = 1
  csv_timestamp_column = "timestamp"
  csv_timestamp_format = "2006-01-02T15:04:05.999Z"
  csv_tag_columns = ["label_area", "label_env", "metric_name", "service_name"]
  csv_column_types = [
    "string",  # timestamp
    "string",  # metric_name
    "string",  # metric_type
    "string",  # metric_value - STRING
    "string",  # service_name
    "string",  # pod_name
    "string",  # container_id
    "string",  # label_area
    "string",  # label_env
    "string",  # help_text
    "string"   # _anomaly
  ]
  name_override = "prom_metrics"

###########################################
# GCP Cloud Metrics Input
###########################################
[[inputs.file]]
  files = ["/logs/gcp_cloud_metrics.csv"]
  data_format = "csv"
  csv_header_row_count = 1
  csv_timestamp_column = "timestamp"
  csv_timestamp_format = "2006-01-02T15:04:05.999Z"
  csv_tag_columns = [
    "project_id",
    "resource_type",
    "resource_id",
    "zone",
    "metric_name",
    "metric_unit",
    "label_app",
    "label_env",
    "label_version"
  ]
  csv_column_types = [
    "string",  # timestamp
    "string",  # project_id
    "string",  # resource_type
    "string",  # resource_id
    "string",  # zone
    "string",  # metric_name
    "string",  # metric_value
    "string",  # metric_unit
    "string",  # cpu_usage_percent - Keep as string
    "string",  # memory_usage_bytes - Keep as string
    "string",  # memory_limit_bytes - Keep as string
    "string",  # network_ingress_bytes - Keep as string
    "string",  # network_egress_bytes - Keep as string
    "string",  # restart_count - Keep as string
    "string",  # label_app
    "string",  # label_env
    "string",  # label_version
    "string"   # _anomaly
  ]
  name_override = "gcp_metrics"
#   csv_trim_space = true
#   csv_skip_errors = true

###########################################
# PROCESSORS
###########################################

# Processor 1: Convert GCP numeric fields, handling empty values
[[processors.starlark]]
  namepass = ["gcp_metrics"]
  order = 1  # Run FIRST

  source = '''
def apply(metric):
    # List of fields to convert to float
    float_fields = [
        "metric_value",
        "cpu_usage_percent",
        "memory_usage_bytes",
        "memory_limit_bytes",
        "network_ingress_bytes",
        "network_egress_bytes",
        "restart_count"
    ]

    for field_name in float_fields:
        if field_name in metric.fields:
            val = str(metric.fields[field_name]).strip()

            # If empty, remove the field
            if val == "" or val == "None":
                metric.fields.pop(field_name)
            else:
                # Try to convert to float
                # Check if it looks like a number
                cleaned = val.replace(".", "").replace("-", "").replace("+", "").replace("e", "").replace("E", "")
                if cleaned.isdigit():
                    metric.fields[field_name] = float(val)
                # If not numeric, leave as string (will be caught by anomaly detector)

    return metric
'''

# Processor 2: Detect anomalies in GCP metric_value
[[processors.starlark]]
  namepass = ["gcp_metrics"]
  order = 2  # Run SECOND (after float conversion)

  source = '''
def apply(metric):
    if "metric_value" in metric.fields and metric.fields.get("metric_value") != None:
        # Check if it's actually a number (float type)
        val = metric.fields.get("metric_value")
        if type(val) == type(1.0) or type(val) == type(1):
            metric.tags["is_anomaly"] = "false"
            metric.fields["anomaly_detected"] = 0.0
        else:
            # It's still a string, meaning conversion failed
            metric.tags["is_anomaly"] = "true"
            metric.tags["anomaly_type"] = "non_numeric"
            metric.fields["anomaly_detected"] = 1.0
            metric.fields["metric_value"] = -999999.0
    else:
        # metric_value doesn't exist or is None
        metric.tags["is_anomaly"] = "true"
        metric.tags["anomaly_type"] = "missing"
        metric.fields["anomaly_detected"] = 1.0
        metric.fields["metric_value"] = -999999.0

    return metric
'''

# Processor 3: Convert prom_metrics metric_value to float
[[processors.converter]]
  namepass = ["prom_metrics"]
  order = 3
  [processors.converter.fields]
    float = ["metric_value"]

# Processor 4: Detect anomalies in prom_metrics
[[processors.starlark]]
  namepass = ["prom_metrics"]
  order = 4

  source = '''
def apply(metric):
    if "metric_value" in metric.fields and metric.fields.get("metric_value") != None:
        metric.tags["is_anomaly"] = "false"
        metric.fields["anomaly_detected"] = 0.0
    else:
        metric.tags["is_anomaly"] = "true"
        metric.tags["anomaly_type"] = "non_numeric"
        metric.fields["anomaly_detected"] = 1.0
        metric.fields["metric_value"] = -999999.0

    return metric
'''

###########################################
# Output Plugin: Write metrics to InfluxDB
###########################################
[[outputs.influxdb]]
  urls = ["http://influxdb:8086"]
  database = "metrics"
  username = "telegraf"
  password = "telegrafpass"
  write_consistency = "any"
  timeout = "10s"
  flush_interval = "10s"